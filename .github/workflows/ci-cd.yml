name: CI/CD — Anti-Disguise GAN

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 src/ api/ mlflow_utils/ frontend/ \
            --max-line-length=120 \
            --ignore=E501,W503

      - name: Check black formatting
        run: black --check src/ api/ mlflow_utils/ frontend/

      - name: Check import order (isort)
        run: isort --check-only src/ api/ mlflow_utils/ frontend/


  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies (CPU torch)
        run: |
          pip install -r requirements.txt \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: tests/


  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Build & Push Docker Images
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ${{ github.repository_owner }}/anti-disguise

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
